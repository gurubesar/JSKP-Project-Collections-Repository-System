<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - UTM Management System</title>
    <link rel="stylesheet" href="UTMTheme.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active"><span>🏠</span>Dashboard</a>
                <a href="#" class="nav-item"><span>📁</span>My Projects</a>
                <a href="#" class="nav-item"><span>👥</span>Team Members</a>
                <a href="#" class="nav-item"><span>📄</span>Submissions</a>
                <a href="#" class="nav-item"><span>👩‍🏫</span>Supervisor</a>
                <a href="#" class="nav-item"><span>📚</span>Resources</a>
                <a href="#" class="nav-item"><span>⚙️</span>Settings</a>
                <a href="#" class="nav-item"><span>🙍</span>Profile</a>
            </nav>
            <div class="sidebar-footer">
                <div class="profile-summary">
                    <div class="profile-avatar">AS</div>
                    <div class="profile-info">
                        <span class="profile-name">Ahmad Syahmi</span>
                        <span class="profile-id">UTM001</span>
                    </div>
                </div>
                <button class="logout-button" type="button">Logout</button>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="dashboard-header">
                <div>
                    <h1>Project Dashboard</h1>
                    <p>Welcome, Ahmad Syahmi</p>
                </div>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="dashboardSearch" placeholder="Search..." aria-label="Search projects">
                    </div>
                    <button class="icon-button" type="button" aria-label="Notifications">🔔</button>
                    <button class="profile-button" type="button" aria-label="User profile">AS</button>
                </div>
            </header>

            <section class="stats-grid">
                <article class="stat-card">
                    <span class="stat-label">Total Projects</span>
                    <strong class="stat-value">4</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">In Progress</span>
                    <strong class="stat-value">2</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Completed</span>
                    <strong class="stat-value">0</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Pending</span>
                    <strong class="stat-value">0</strong>
                </article>
            </section>

            <section class="projects-section">
                <div class="section-title-row">
                    <h2>My Projects</h2>
                </div>
                <div id="projectsContainer" class="projects-grid"></div>
            </section>
        </main>
    </div>

    <script>
        const projects = [
            {
                title: 'AI-based Traffic Management System',
                id: 'UTM-FYP-2024-12',
                status: 'In Progress',
                progress: 85,
                teamSize: 4,
                supervisor: 'Dr. Azlina',
                dueDate: '2024 • 15 Nov 2024',
                statusClass: 'status-in-progress'
            },
            {
                title: 'IoT Smart Agriculture Platform',
                id: 'UTM-FYP-2024-12',
                status: 'Submitted',
                progress: 100,
                teamSize: 3,
                supervisor: 'Prof. Rosli',
                dueDate: '2024 • 15 Nov 2024',
                statusClass: 'status-submitted'
            },
            {
                title: 'Blockchain Medical Records',
                id: 'UTM-FYP-2024-12',
                status: 'Proposal',
                progress: 30,
                teamSize: 1,
                supervisor: 'Prof. Dr. Noor Azlina',
                dueDate: '15 Nov 2024',
                statusClass: 'status-proposal'
            },
            {
                title: 'ML Crop Prediction',
                id: 'UTM-FYP-2024-12',
                status: 'Approved',
                progress: 100,
                teamSize: 4,
                supervisor: 'Prof. Azman',
                dueDate: '15 Nov 2024',
                statusClass: 'status-approved'
            }
        ];

        const container = document.getElementById('projectsContainer');

        function createProjectCard(project) {
            const card = document.createElement('article');
            card.className = 'project-card';

            card.innerHTML = `
                <div class="project-card-header">
                    <div>
                        <h3>${project.title}</h3>
                        <p class="project-id">Project ID: ${project.id}</p>
                    </div>
                    <span class="project-status ${project.statusClass}">${project.status}</span>
                </div>
                <div class="project-progress-row">
                    <span>Progress Bar</span>
                    <strong>${project.progress}% Completion</strong>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${project.progress}%"></div>
                </div>
                <div class="project-details-row">
                    <div>
                        <span class="detail-label">Team Members</span>
                        <div class="team-avatars">
                            <span>👤</span><span>👤</span><span>👤</span><span>👤</span>
                        </div>
                        <p class="detail-text">Team of ${project.teamSize}</p>
                    </div>
                    <div>
                        <span class="detail-label">Supervisor</span>
                        <p class="detail-text">${project.supervisor}</p>
                    </div>
                    <div>
                        <span class="detail-label">Due Date</span>
                        <p class="detail-text">${project.dueDate}</p>
                    </div>
                </div>
                <div class="project-card-actions">
                    <button type="button" class="primary-button">View Details</button>
                    <button type="button" class="secondary-button">Manage Project</button>
                    <button type="button" class="tertiary-button">Submit Report</button>
                </div>
            `;

            return card;
        }

        projects.forEach(project => container.appendChild(createProjectCard(project)));
    </script>
</body>
</html>
